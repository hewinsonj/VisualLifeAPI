# fly.toml app configuration file generated for visual-life-api on 2026-07-13T20:45:55-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'visual-life-api'
primary_region = 'iad'

[build]
[http_service]
  internal_port = 8000
  force_https = true
  # Keep one machine always warm so there are no ~7s cold-start 5xx blips for
  # the first request after idle. Extra machines (if scaled) can still autostop.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']
[[http_service.checks]]
    interval = "30s"  
    timeout  = "5s"
    grace_period = "10s"
    method = "GET"
    path   = "/health"
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
